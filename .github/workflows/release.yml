# App-Releases: macOS (dmg/zip), Windows (NSIS), Linux (deb/pacman) via Electron,
# Android (signierte APK) via Capacitor/Gradle.
# Vorbild: S1-Control (build-main.yml) — Datums-Version, Git-Tag, GitHub Release.
name: App Releases

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      build_version: ${{ steps.version.outputs.build_version }}
    steps:
      - uses: actions/checkout@v4

      - name: Build-Version erzeugen
        id: version
        run: |
          # Einheitliches Format YYYY.MMDD.HHMM (z. B. 2026.712.1035): zugleich
          # gültiges SemVer (electron/npm) und CFBundleShortVersionString (iOS),
          # minutengenau und über Tages-/Jahresgrenzen monoton steigend.
          Y=$(date -u +%Y)
          MMDD=$(( 10#$(date -u +%m) * 100 + 10#$(date -u +%d) ))
          HHMM=$(( 10#$(date -u +%H) * 100 + 10#$(date -u +%M) ))
          echo "build_version=$Y.$MMDD.$HHMM" >> "$GITHUB_OUTPUT"

      - name: Git-Tag anlegen
        env:
          BUILD_VERSION: ${{ steps.version.outputs.build_version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$BUILD_VERSION" "$GITHUB_SHA"
          git push origin "$BUILD_VERSION"

  check:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  build-mac:
    runs-on: macos-latest
    needs: [prepare, check]
    env:
      BUILD_VERSION: ${{ needs.prepare.outputs.build_version }}
      # Footer-Anzeige = Build-/Tag-Version (identisch zur npm-/electron-Version).
      APP_BUILD_VERSION: ${{ needs.prepare.outputs.build_version }}
      # Signiert wird nur, wenn die Secrets hinterlegt sind (wie bei S1-Control);
      # sonst unsigniert (Gatekeeper: Rechtsklick → Öffnen, kein Auto-Update auf macOS).
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # Ohne Zertifikat die Identitätssuche abschalten (unsignierter Build).
      # Achtung: Mit CSC_LINK darf die Variable NICHT gesetzt sein, sonst
      # überspringt electron-builder die Suche trotz importiertem Zertifikat.
      - name: Unsigniert bauen, wenn kein Zertifikat hinterlegt ist
        if: env.CSC_LINK == ''
        run: echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"
      - name: App Store Connect API-Key vorbereiten (nur mit Secrets)
        if: env.APPLE_API_KEY_ID != ''
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          node -e "const fs=require('node:fs'); fs.writeFileSync(process.argv[1], Buffer.from(process.env.APPLE_API_KEY_BASE64, 'base64'));" "$KEY_PATH"
          echo "APPLE_API_KEY=$KEY_PATH" >> "$GITHUB_ENV"
          echo "NOTARIZE=true" >> "$GITHUB_ENV"
      - name: macOS-Artefakte bauen (dmg, zip)
        run: |
          npm pkg set version="${{ needs.prepare.outputs.build_version }}"
          npm run build
          npx electron-builder --mac --publish never \
            ${NOTARIZE:+--config.mac.notarize=true} \
            --config.artifactName='Erfassungsbogen-${{ env.BUILD_VERSION }}-${os}-${arch}.${ext}'
          node scripts/ensure-update-metadata.cjs mac
      - uses: actions/upload-artifact@v4
        with:
          name: erfassungsbogen-mac-${{ env.BUILD_VERSION }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest*.yml

  build-win:
    runs-on: windows-latest
    needs: [prepare, check]
    env:
      BUILD_VERSION: ${{ needs.prepare.outputs.build_version }}
      # Footer-Anzeige = Build-/Tag-Version (identisch zur npm-/electron-Version).
      APP_BUILD_VERSION: ${{ needs.prepare.outputs.build_version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Windows-Artefakte bauen (NSIS-Installer)
        run: |
          npm pkg set version="${{ needs.prepare.outputs.build_version }}"
          npm run build
          npx electron-builder --win --x64 --publish never --config.artifactName='Erfassungsbogen-${{ env.BUILD_VERSION }}-${os}-${arch}.${ext}'
          node scripts/ensure-update-metadata.cjs win
      - uses: actions/upload-artifact@v4
        with:
          name: erfassungsbogen-win-${{ env.BUILD_VERSION }}
          path: |
            release/*.exe
            release/*.blockmap
            release/latest*.yml

  build-linux:
    runs-on: ubuntu-latest
    needs: [prepare, check]
    env:
      BUILD_VERSION: ${{ needs.prepare.outputs.build_version }}
      # Footer-Anzeige = Build-/Tag-Version (identisch zur npm-/electron-Version).
      APP_BUILD_VERSION: ${{ needs.prepare.outputs.build_version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Pacman-Packwerkzeuge installieren
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools
      - run: npm ci
      - name: Linux-Artefakte bauen (deb, pacman)
        run: |
          npm pkg set version="${{ needs.prepare.outputs.build_version }}"
          npm run build
          npx electron-builder --linux --x64 --publish never \
            --config.artifactName='Erfassungsbogen-${{ env.BUILD_VERSION }}-${os}-${arch}.${ext}'
          node scripts/ensure-update-metadata.cjs linux
      - uses: actions/upload-artifact@v4
        with:
          name: erfassungsbogen-linux-${{ env.BUILD_VERSION }}
          path: |
            release/*.deb
            release/*.pacman
            release/latest*.yml

  build-android:
    runs-on: ubuntu-latest
    needs: [prepare, check]
    env:
      BUILD_VERSION: ${{ needs.prepare.outputs.build_version }}
      # Footer-Anzeige = Release-/Tag-Version.
      APP_BUILD_VERSION: ${{ needs.prepare.outputs.build_version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - run: npm ci
      - name: Web-App bauen und nach Android syncen
        run: |
          npm run build
          npx cap sync android
      - name: Keystore aus Secret entpacken
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
      - name: Signierte APK bauen
        working-directory: android
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          # versionCode muss pro Release monoton steigen (Minuten seit Epoche).
          ./gradlew assembleRelease \
            -PappVersionCode=$(( $(date -u +%s) / 60 )) \
            -PappVersionName="$BUILD_VERSION"
          cp app/build/outputs/apk/release/app-release.apk \
            "app/build/outputs/apk/release/Erfassungsbogen-$BUILD_VERSION-android.apk"
      - uses: actions/upload-artifact@v4
        with:
          name: erfassungsbogen-android-${{ env.BUILD_VERSION }}
          path: android/app/build/outputs/apk/release/Erfassungsbogen-*.apk

  release:
    runs-on: ubuntu-latest
    needs: [prepare, build-mac, build-win, build-linux, build-android]
    steps:
      - name: Artefakte herunterladen
        uses: actions/download-artifact@v4
        with:
          pattern: erfassungsbogen-*-${{ needs.prepare.outputs.build_version }}
          merge-multiple: true
          path: artifacts

      - name: GitHub Release erstellen
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.build_version }}
          name: ${{ needs.prepare.outputs.build_version }}
          files: artifacts/*
