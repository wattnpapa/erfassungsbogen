name: GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build-Version erzeugen (Footer-Anzeige)
        # Einheitliches Format YYYY.MMDD.HHMM (z. B. 2026.712.1035), wie im Release-Workflow.
        run: |
          Y=$(date -u +%Y)
          MMDD=$(( 10#$(date -u +%m) * 100 + 10#$(date -u +%d) ))
          HHMM=$(( 10#$(date -u +%H) * 100 + 10#$(date -u +%M) ))
          echo "APP_BUILD_VERSION=$Y.$MMDD.$HHMM" >> "$GITHUB_ENV"
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
